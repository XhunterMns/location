<div class="add-local-screen">
    <div class="modal-backdrop" (click)="close()"></div>

    <div class="add-local-modal" role="dialog" aria-modal="true" aria-labelledby="add-local-title">
        <button class="close-btn" type="button" (click)="close()" aria-label="Close">x</button>

        <div class="card-title">
            <h1 id="add-local-title">Add Local</h1>
            <span>Create a new listing for your property.</span>
        </div>

        <form [formGroup]="localForm" (ngSubmit)="submit()" class="form-group">
            <div class="input-box">
                <label>Titre</label>
                <input formControlName="titre" placeholder="Enter local title" />
            </div>

            <div class="input-box">
                <label>Adresse</label>
                <input formControlName="adresse" placeholder="Enter address" />
            </div>

            <div class="input-box">
                <label>Description</label>
                <textarea formControlName="description" placeholder="Add a short description"></textarea>
            </div>

            <div class="input-box">
                <label>Prix</label>
                <input type="number" formControlName="prix" placeholder="Enter price" />
            </div>
            <div class="upload-box">
                <label>Upload Images</label>
                <input type="file" (change)="onFilesSelected($event)" multiple accept="image/*" />
                <small *ngIf="selectedFiles.length">{{ selectedFiles.length }} image(s) selected</small>
                <small *ngIf="uploadError" class="error-text">{{ uploadError }}</small>
            </div>
            
            <div class="actions">
                <button type="button" class="secondary-btn" (click)="close()">Cancel</button>
                <button type="submit">Create</button>
            </div>
        </form>
    </div>
</div>
